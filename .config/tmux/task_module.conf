# vim:set ft=tmux:
# Custom Catppuccin module for taskwarrior

%hidden MODULE_NAME="task"

set -ogq "@catppuccin_${MODULE_NAME}_icon" "󰄬 "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_red}"
set -ogq "@catppuccin_${MODULE_NAME}_text" " #(~/.config/tmux/task-status.sh)"

source -F "#{TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf"

